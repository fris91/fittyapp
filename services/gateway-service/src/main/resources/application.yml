spring:
  config:
    import: optional:configserver:http://localhost:8888
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        # Lets the gateway answer CORS preflight (OPTIONS) requests that don't otherwise map to a
        # route handler. Without this, preflights fall through and are rejected (403).
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
              - "http://192.168.1.192:30000"
              - "http://fitty-cp-01:30000"
              - "http://fitty.local:30000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/identity/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/user-service/**
        - id: user-admin-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/admin/users/**
        - id: mobile-bff
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/mobile/**
        - id: health-data-service
          uri: ${HEALTH_DATA_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/health-data/**
        - id: recommendation-service
          uri: ${RECOMMENDATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/recommendations/**
        - id: ai-service
          uri: ${RECOMMENDATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/ai/**
        - id: meal-service
          uri: ${MEAL_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/meal-service/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:30081/realms/fitty}

server:
  port: ${SERVER_PORT:8080}

fitty:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-change-me-local-development-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
