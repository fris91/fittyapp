spring:
  config:
    import: optional:configserver:http://localhost:8888
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/user-service/**
        - id: health-data-service
          uri: ${HEALTH_DATA_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/health-data/**
        - id: recommendation-service
          uri: ${RECOMMENDATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/recommendations/**
        - id: meal-service
          uri: ${MEAL_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/meal-service/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**

server:
  port: ${SERVER_PORT:8080}

fitty:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-change-me-local-development-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
