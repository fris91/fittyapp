apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: fitty-app
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8086
      targetPort: 8086
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: fitty-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: fitty-cp-01:5000/fitty/notification-service:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          env:
            - name: SERVER_PORT
              value: "8086"
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://fitty:fitty@mongo.fitty-data.svc.cluster.local:27017/fitty-notifications?authSource=admin
          envFrom:
            - configMapRef:
                name: fitty-app-config
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
