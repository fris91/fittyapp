apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: fitty-app
spec:
  type: NodePort
  selector:
    app: web-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: fitty-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: fitty-cp-01:5000/fitty/web-app:local
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: fitty-app-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
