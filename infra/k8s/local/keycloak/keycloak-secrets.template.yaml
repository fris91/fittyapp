apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: fitty-system
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin123
  KC_DB_USERNAME: keycloak
  KC_DB_PASSWORD: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: keycloak
  POSTGRES_DB: keycloak
  # --- Social login provider credentials, substituted into the realm import (${GOOGLE_CLIENT_ID} etc.).
  # Leave empty to keep Google/Facebook disabled. See docs/integrations/oauth-google-facebook.md.
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  FACEBOOK_CLIENT_ID: ""
  FACEBOOK_CLIENT_SECRET: ""
