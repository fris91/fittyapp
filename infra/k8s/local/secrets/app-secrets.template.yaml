apiVersion: v1
kind: Secret
metadata:
  name: fitty-app-secrets
  namespace: fitty-app
type: Opaque
stringData:
  JWT_SECRET: local-development-secret-change-me-local-development-secret
  POSTGRES_USER: fitty
  POSTGRES_PASSWORD: fitty
  POSTGRES_DB: fitty
  MONGO_INITDB_ROOT_USERNAME: fitty
  MONGO_INITDB_ROOT_PASSWORD: fitty
  KEYCLOAK_ADMIN_USERNAME: admin
  KEYCLOAK_ADMIN_PASSWORD: admin123
  # --- Local AI: LM Studio usually needs no key; leave empty unless you enabled auth in LM Studio. ---
  LM_STUDIO_API_KEY: ""
  # --- Social login provider secrets (brokered by Keycloak). Fill before enabling Google/Facebook. ---
  # See docs/integrations/oauth-google-facebook.md. Do not commit real values; copy this template to
  # app-secrets.yaml (gitignored) and apply that.
  GOOGLE_CLIENT_SECRET: ""
  FACEBOOK_CLIENT_SECRET: ""
