apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: fitty-app
spec:
  selector:
    app: recommendation-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: fitty-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
        - name: recommendation-service
          image: fitty-cp-01:5000/fitty/recommendation-service:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://fitty:fitty@mongo.fitty-data.svc.cluster.local:27017/fitty-recommendations?authSource=admin
          envFrom:
            - configMapRef:
                name: fitty-app-config
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
