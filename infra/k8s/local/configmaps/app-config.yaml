apiVersion: v1
kind: ConfigMap
metadata:
  name: fitty-app-config
  namespace: fitty-app
data:
  JWT_ISSUER: fitty-local-k8s
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka.fitty-data.svc.cluster.local:9092
  AUTH_SERVICE_URL: http://auth-service.fitty-app.svc.cluster.local:8081
  IDENTITY_SERVICE_URL: http://identity-service.fitty-app.svc.cluster.local:8087
  USER_SERVICE_URL: http://user-service.fitty-app.svc.cluster.local:8082
  HEALTH_DATA_SERVICE_URL: http://health-data-service.fitty-app.svc.cluster.local:8083
  RECOMMENDATION_SERVICE_URL: http://recommendation-service.fitty-app.svc.cluster.local:8084
  MEAL_SERVICE_URL: http://nutrition-service.fitty-app.svc.cluster.local:8085
  NOTIFICATION_SERVICE_URL: http://notification-service.fitty-app.svc.cluster.local:8086
  VITE_API_BASE_URL: http://192.168.1.192:30080
  VITE_KEYCLOAK_URL: http://192.168.1.192:30081
  VITE_KEYCLOAK_REALM: fitty
  VITE_KEYCLOAK_CLIENT_ID: fitty-web
  KEYCLOAK_ISSUER_URI: http://keycloak.fitty-system.svc.cluster.local:8080/realms/fitty
  KEYCLOAK_BASE_URL: http://keycloak.fitty-system.svc.cluster.local:8080
  KEYCLOAK_REALM: fitty
  KEYCLOAK_ADMIN_REALM: master
  KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
  KEYCLOAK_TOKEN_CLIENT_ID: fitty-mobile
  KEYCLOAK_WEB_CLIENT_ID: fitty-web
  KEYCLOAK_WEB_REDIRECT_URI: http://192.168.1.192:30000/
  # --- Local AI (LM Studio, OpenAI-compatible). Secret LM_STUDIO_API_KEY lives in fitty-app-secrets. ---
  FITTY_AI_ENABLED: "true"
  # host.docker.internal points at the developer machine running LM Studio from inside the cluster
  # nodes only if that name is resolvable there. For a fixed homelab set this to the dev machine IP,
  # e.g. http://192.168.1.50:1234  (see docs/integrations/lm-studio-ai.md).
  LM_STUDIO_BASE_URL: http://192.168.1.50:1234
  FITTY_AI_MODEL_FITNESS: "Llama 3.2 1B FitnessAssistant"
  FITTY_AI_MODEL_MEDICAL: "Llama Doctor 3.2 3B Instruct"
  FITTY_AI_MODEL_REASONING: "mistralai/devstral-small-2-2512"
  # --- Social login (consumed by Keycloak as identity-provider config, not by app pods). ---
  # Client IDs are not secret; the matching secrets live in fitty-app-secrets.
  GOOGLE_CLIENT_ID: ""
  FACEBOOK_CLIENT_ID: ""
