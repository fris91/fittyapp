apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: fitty-app
spec:
  selector:
    app: identity-service
  ports:
    - name: http
      port: 8087
      targetPort: 8087
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: fitty-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: fitty-cp-01:5000/fitty/identity-service:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          env:
            - name: SERVER_PORT
              value: "8087"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server.fitty-system.svc.cluster.local:8888
            - name: KEYCLOAK_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_BASE_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_ADMIN_REALM
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_ADMIN_REALM
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_ADMIN_CLIENT_ID
            - name: KEYCLOAK_TOKEN_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_TOKEN_CLIENT_ID
            - name: KEYCLOAK_WEB_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_WEB_CLIENT_ID
            - name: KEYCLOAK_WEB_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: KEYCLOAK_WEB_REDIRECT_URI
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fitty-app-config
                  key: USER_SERVICE_URL
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fitty-app-secrets
                  key: KEYCLOAK_ADMIN_USERNAME
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fitty-app-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
          envFrom:
            - configMapRef:
                name: fitty-app-config
            - secretRef:
                name: fitty-app-secrets
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 25
            periodSeconds: 10
